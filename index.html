<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Gerenciamento de Tarefas Disciplinares</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="tela-login" id="telaLogin">

    <div class="login-box">

      <h1>Web Gerenciamento de Tarefas Disciplinares</h1>

      <input type="text"
        id="usuario"
        placeholder="Digite seu nome">

      <select id="perfil">

        <option value="Professor">
          Professor
        </option>

        <option value="Aluno">
          Aluno
        </option>

      </select>

      <button type="button"
        onclick="entrarSistema()">

        Entrar

      </button>

    </div>

  </div>

  <div id="sistema" style="display: none;">

    <header>

      <h1>
        Web Gerenciamento de Tarefas Disciplinares
      </h1>

      <section class="disciplina-box">

        <input type="text"
          id="disciplina"
          placeholder="Nome da disciplina">

        <button onclick="criarDisciplina()">
          Criar Disciplina
        </button>

        <select id="filtroStatus"
          onchange="filtrarCards()">

          <option value="todos">
            Todas as tarefas
          </option>

          <option value="pendente">
            Pendentes
          </option>

          <option value="concluido">
            Concluídas
          </option>

        </select>

      </section>

      <div class="formulario"
        id="areaProfessor">

        <input type="text"
          id="titulo"
          placeholder="Título da atividade">

        <textarea
          id="descricao"
          placeholder="Descrição da atividade"></textarea>

        <input type="date"
          id="prazo">

        <input type="time"
          id="horario">

        <input type="text"
          id="aluno"
          placeholder="Aluno responsável">

        <select id="disciplinaSelect">

          <option value="">
            Selecione a disciplina
          </option>

        </select>

        <select id="responsavel">

          <option value="Aluno">
            Aluno
          </option>

          <option value="Grupo">
            Grupo
          </option>

        </select>

        <button onclick="criarCard()">
          Cadastrar Atividade
        </button>

      </div>

    </header>

    <main class="board">

      <section class="column"
        id="todo"
        ondrop="drop(event)"
        ondragover="allowDrop(event)">

        <h2>A Fazer</h2>

      </section>

      <section class="column"
        id="doing"
        ondrop="drop(event)"
        ondragover="allowDrop(event)">

        <h2>Em Andamento</h2>

      </section>

      <section class="column"
        id="done"
        ondrop="drop(event)"
        ondragover="allowDrop(event)">

        <h2>Concluído</h2>

      </section>

    </main>

  </div>

  <script defer src="script.js"></script>

</body>
</html>
